name: raw_magnifier_plus
description: >-
  A powerful, composable Flutter magnifier widget with zero dependencies.
  Supports custom ShapeBorder for images, videos, and complex UI layouts.
version: 0.1.0
homepage: https://github.com/popeyewrener/raw_magnifier_plus
repository: https://github.com/popeyewrener/raw_magnifier_plus
issue_tracker: https://github.com/popeyewrener/raw_magnifier_plus/issues

topics:
  - magnifier
  - zoom
  - loupe
  - image-zoom
  - raw-magnifier

# Dart SDK >=2.18.0 because RawMagnifier shipped with Flutter 3.3.0 / Dart 2.18.
environment:
  sdk: '>=2.18.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
